<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0085FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)" />
  
  <!-- Stack layers representing "Paystack" -->
  <rect x="25" y="55" width="50" height="8" rx="2" fill="white" opacity="0.9"/>
  <rect x="25" y="42" width="50" height="8" rx="2" fill="white" opacity="0.95"/>
  <rect x="25" y="29" width="50" height="8" rx="2" fill="white"/>
  
  <!-- Credit card symbol -->
  <rect x="30" y="32" width="6" height="4" rx="1" fill="url(#grad1)"/>
</svg>
